# ============================================================
# 2026 Revenue Model - Configuration
# ============================================================
# All business assumptions in one place.
# Edit values here; re-run the script to regenerate the model.
#
# Sources:
#   - Sales Leadership facing [Projections & Goals - Feb 10].xlsx
#   - Final 2026 Revenue Model - SF Data (1).xlsx
#   - Sales Team Roster.xlsx
# ============================================================

fiscal_year: 2026

# --- Annual Targets ---
# Source: [Loop Internal] Financial Projections 2026 - Base 80% Final V1.xlsx
targets:
  gross_new_arr: 18783104       # New Customer ARR + Upsell
  net_new_arr: 17083104         # New Customer ARR only
  expansion_arr: 1700000        # Upsell / Expansion (ramps monthly)
  churn_rate: 0.0257            # ~$231,948/yr on $9.04M starting ARR
  starting_arr: 9041808         # Jan 1, 2026 starting ARR
  monthly_churn_arr: 19329      # Average monthly churn

# --- Monthly Targets (new business + expansion) ---
# Source: Financial Projections 2026 → ARR Waterfall rows 18-19
# NB targets ramp with headcount; expansion ramps monthly
monthly_targets:
  1:  { new_biz:  716667, expansion:  90032 }
  2:  { new_biz:  749998, expansion:  94053 }
  3:  { new_biz: 1133322, expansion:  99667 }
  4:  { new_biz: 1324983, expansion: 106941 }
  5:  { new_biz: 1424981, expansion: 119305 }
  6:  { new_biz: 1524978, expansion: 131799 }
  7:  { new_biz: 1624975, expansion: 142444 }
  8:  { new_biz: 1716640, expansion: 148219 }
  9:  { new_biz: 1716640, expansion: 157606 }
  10: { new_biz: 1716640, expansion: 187116 }
  11: { new_biz: 1716640, expansion: 204519 }
  12: { new_biz: 1716640, expansion: 218300 }

# --- Segment Definitions ---
# Source: Sales Leadership "Location analysis" + Revenue Model Overview
# target_ads / target_arpl / target_lpd = planning assumptions (Revenue Model Overview)
# avg_deal_size / arpl = actuals-based values (Location Analysis)
segments:
  SMB:
    avg_deal_size: 8076          # ACV per customer (Location analysis R9)
    target_ads: 10000            # Planning target ADS (Revenue Model Overview)
    mix_pct: 0.2221              # % of new customer ARR
    arpl: 1768                   # ARR per location (Location analysis)
    target_arpl: 2285            # ARPL target (Revenue Model Overview row 65)
    target_lpd: 3.5              # Avg locations per deal target
  MM:
    avg_deal_size: 36174         # ACV per customer (Location analysis R10)
    target_ads: 36000            # Planning target ADS
    mix_pct: 0.5899              # % of new customer ARR
    arpl: 1270                   # ARR per location (Location analysis)
    target_arpl: 1636            # ARPL target (Revenue Model Overview row 64)
    target_lpd: 22               # Avg locations per deal target
  Ent:
    avg_deal_size: 161373        # ACV per customer (Location analysis R11)
    target_ads: 100000           # Planning target ADS
    mix_pct: 0.1880              # % of new customer ARR
    arpl: 703                    # ARR per location (Location analysis)
    target_arpl: 1000            # ARPL target (Revenue Model Overview row 63)
    target_lpd: 100              # Avg locations per deal target

# --- Blended Targets (for Dashboard KPIs) ---
blended_targets:
  arpl: 1640                     # Blended ARPL target (Overview row 62)
  ads: 25000                     # Blended ADS target - new business (Overview B5)
  lpd: 13                        # Blended locations per deal target (Overview C11)

# --- Quarterly Funnel Targets (deals needed to hit revenue) ---
# Source: Revenue Model Overview rows 39-42
# These are the number of closed deals needed per quarter by segment.
quarterly_funnel_targets:
  Q1: { SMB: 73.13, MM: 34.15, Ent: 4.54 }
  Q2: { SMB: 123.86, MM: 57.83, Ent: 7.69 }
  Q3: { SMB: 147.58, MM: 68.91, Ent: 9.16 }
  Q4: { SMB: 150.36, MM: 70.21, Ent: 9.34 }

# --- Win / Conversion Rates ---
# Source: Revenue Model Overview + Forecast sheet
rates:
  win_rate_new_biz: 0.30         # Assumed NB win rate
  win_rate_expansion: 0.95       # Assumed expansion win rate
  hold_rate: 0.50
  opps_per_win: 3.3
  stage_win_rates:               # Pipeline weighting by phase
    Early: 0.10
    Mid: 0.30
    Late: 0.60

# --- Seasonality Index (per month) ---
# Source: Revenue Model Forecast sheet, row 28
seasonality:
  1:  0.50
  2:  0.60
  3:  0.90
  4:  1.00
  5:  1.00
  6:  1.00
  7:  1.00
  8:  1.00
  9:  1.00
  10: 1.00
  11: 1.00
  12: 1.33

# --- Salesforce Stage Mapping ---
# Maps each SF stage name to a category and pipeline phase.
#   category: Revenue | Pipeline | Lost | No Show | Disqualified
#   phase:    Early | Mid | Late  (only for Pipeline category)
stage_mapping:
  "New - Meeting Set":
    category: Pipeline
    phase: Early
  "Demo":
    category: Pipeline
    phase: Early
  "No Show":
    category: No Show
    phase: null
  "Sent":
    category: Pipeline
    phase: Early
  "Pilot":
    category: Pipeline
    phase: Mid
  "Business Case":
    category: Pipeline
    phase: Mid
  "Proposal":
    category: Pipeline
    phase: Late
  "Closed Won":
    category: Revenue
    phase: null
  "Closed Lost":
    category: Lost
    phase: null
  "Disqualified":
    category: Disqualified
    phase: null

# ============================================================
