# Conductor V1.5 fan-out — CS pod 1
# Audience: Jackie's CS team — Bryan Peguero (Sr), Evan Reilly, Manin Khin, Hannah Cobb (Impl), Blaine Alleluia (CS Ops), Saif, Jon Cruz (Sr Ent), Casey Hilder (Ops), Bailey Kellenberger
# Stage: DORMANT in V1. Register now; enable after V1 pilot proves useful_rate +5pp.
display_information:
  name: "@oo-cs-pod-1"
  description: Loop AI Conductor for CSMs — churn risk alerts, renewal window nudges, expansion signal surfacing from Loop Pulse + Vitally, handoff coordination with Onboarding + Agent 4 CS.
  background_color: "#0a2e1a"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: oo-cs-pod-1
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
