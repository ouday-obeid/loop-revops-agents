# Conductor V1.5 fan-out — SLT
# Audience: Anand (CEO), Henry (CRO), Hutch (Sales Dir), Jackie (CS Dir), Brian (SDR Dir)
# Stage: DORMANT in V1 (oo-leadership covers this cohort in V1). Register as a dedicated SLT surface for V2 when role-hierarchy nuance matters.
# Note: overlaps with oo-leadership in V1; kept separate registration to allow splitting CEO-only vs dir-tier flows later.
display_information:
  name: "@oo-slt"
  description: Loop AI Conductor SLT surface — pipeline/forecast/board-metric DM digests, approval routing for `slt_draft_review` gates, two-key self-improvement approvals (O + Henry).
  background_color: "#1a0a2e"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: oo-slt
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
