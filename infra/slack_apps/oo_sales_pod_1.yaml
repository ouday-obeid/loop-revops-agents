# Conductor V1.5 fan-out — Sales pod 1 (MM + ENT AEs)
# Audience: Nate's MM team (Carlton, Eric, Simon, Nick, + rotations) + Charles's ENT team (Taylor, Clayton, Daniel, Matt, Jessy)
# Stage: DORMANT in V1. Register now; enable after V1 pilot proves useful_rate +5pp.
display_information:
  name: "@oo-sales-pod-1"
  description: Loop AI Conductor for Sales AEs — pipeline stall alerts, follow-up nudges pre/post meeting, call-brief generation from Fireflies.
  background_color: "#1a2e0a"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: oo-sales-pod-1
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
