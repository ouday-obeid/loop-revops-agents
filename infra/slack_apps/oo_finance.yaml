# Conductor V1.5 fan-out — Finance
# Audience: Adhyan (Finance), Arvind (Post-sales ops), Anand, O
# Stage: DORMANT in V1. Register now; enable after V1 pilot proves useful_rate +5pp.
display_information:
  name: "@oo-finance"
  description: Loop AI Conductor for Finance — ARR/NRR rollup coordination with Accountant (SLT Metrics agent), Excel workbook review nudges, GDrive publishing status, board-ready metric alerts.
  background_color: "#2e0a1a"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: oo-finance
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
