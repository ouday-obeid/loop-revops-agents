[alembic]
script_location = shared/db/migrations
prepend_sys_path = .

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatters]
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
