# ICP scoring weights — 100-point model for restaurant franchise groups.
# Regenerated by `python -m agents.top_of_funnel.icp_scorer calibrate`.
# Last calibration: PENDING (D2 — awaiting closed-won fixture from O).

version: 1
total_budget: 100

dimensions:
  ownership:
    max: 25
    bands:
      franchise_group_multi_brand: 25
      franchise_group_single_brand: 18
      single_brand_franchisee: 10
      independent: 0

  location_count:
    max: 25
    bands:
      - {min: 50, points: 25, tier: ENT}
      - {min: 10, points: 18, tier: MM}
      - {min: 3,  points: 10, tier: SMB}
      - {min: 0,  points: 3,  tier: SMB}

  brand_vertical:
    max: 20
    bands:
      QSR: 20
      Fast_Casual: 15
      Casual_Dining: 8
      Fine_Dining: 3
      Other: 0

  growth_signals:
    max: 20
    components:
      recent_ma_activity: 10
      funding_round_last_12mo: 6
      new_openings_velocity: 4
    # total capped at dimensions.growth_signals.max

  tech_stack_fit:
    max: 10
    components:
      pos_toast: 5
      pos_square: 5
      pos_other_integrated: 3
      modern_loyalty_platform: 3
      delivery_platform_integrated: 2

bonuses:
  product_attach:
    points: 5
    condition: current_loop_products_nonempty

tiers:
  A_threshold: 70     # top-of-queue, ENT treatment
  B_threshold: 45     # briefing inclusion
  exploration_floor: 25  # below-threshold-but-high-dimension-signal slot
